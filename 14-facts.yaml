- name: check the facts
  hosts: local
  connection: local
  become: yes # to install the nginx package we need root privileges, so we have used become: yes to elevate the privileges to root user
  tasks:
  - name: install nginx if redhat
    ansible.builtin.dnf:
      name: nginx
      state: latest
    when: ansible_os_family == "RedHat" # use ansible_ while referring the facts

  - name: install nginx if redhat
    ansible.builtin.apt:
      name: nginx
      state: latest
    when: ansible_os_family == "Debian"
    