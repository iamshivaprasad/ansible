- name: functions
  hosts: local
  connection: local
  vars:
    technologies: DevOps, Linux, Shell, Ansible # string
    name: "Sivakumar reddy M"
    gmail: Info@GMAIL.COM
    ipaddress: "19222.168.0.1"
    # dictionary == map
    tags:
      Application: payment
      Environment: dev
    # List
    listTags:
    - key: Application
      value: payment
    - key: Environment
      value: dev
  tasks:
  - name: default variable
    ansible.builtin.debug:
      msg: "Hello, {{ name | default('Ramesh') }}"
    
  # string to list
  - name: convert string to list
    ansible.builtin.debug:
      msg: "Technologies are: {{ technologies | split(',') }}" # to split the string into a list using comma as a separator

  - name: convert map to list
    ansible.builtin.debug:
      msg: "Tags are: {{ tags | dict2items }}" # to convert the dictionary into a list of dictionaries with key and value as keys

  - name: convert list into map
    ansible.builtin.debug:
      msg: "tag map: {{ listTags | items2dict }}" # to convert the list of dictionaries into a dictionary with key and value as keys

  - name: read yaml and take it into variable
    ansible.builtin.set_fact:
      student_yaml: "{{ lookup('file', 'student.yaml') | from_yaml }}" # to read the yaml file and convert it into a dictionary using from_yaml filter and store it in the variable student_yaml

  - name: convert yaml into json
    ansible.builtin.debug:
      msg: "json: {{ student_yaml | to_json  }}" # to convert the yaml data into json format using to_json filter and print it

  - name: save json to file
    ansible.builtin.copy:
      dest: ./stundent-data.json
      content: "{{ student_yaml | to_nice_json  }}" # to convert the yaml data into json format using to_nice_json filter and save it to the file student-data.json

  - name: convert uppercase
    ansible.builtin.debug:
      msg: "{{ name | upper }}" # to convert the string into uppercase using upper filter and print it

  - name: convert lowercase
    ansible.builtin.debug:
      msg: "{{ gmail | lower }}" # to convert the string into lowercase using lower filter and print it

  - name: check IP is valid or not
    ansible.builtin.debug: 
      msg: "{{ ipaddress | ansible.utils.ipv4 }}" # to check if the IP address is valid or not

  - name: grep for root
    #ansible.builtin.command: cat /etc/passwd | grep root
    ansible.builtin.shell: cat /etc/passwd | grep root
    register: command_output # to store the output of the command in the variable command_output

  - name: print the command_output
    ansible.builtin.debug:
      msg: "{{ command_output }}"   # to print the output of the command stored in the variable command_output

  - name: redirect the output
    ansible.builtin.command: ls -ltr > /tmp/output.txt # to redirect the output of the command to the file output.txt but when we use command module it will not execute the command in the shell and it will not redirect the output to the file output.txt but when we use shell module it will execute the command in the shell and it will redirect the output to the file output.txt
    register: redirect_output
    ignore_errors: true

  - name: print redirect_output
    ansible.builtin.debug:
      msg: "{{ redirect_output }}" # to print the output of the command stored in the variable redirect_output, when we use command module it will not execute the command in the shell and it will not redirect the output to the file output.txt but when we use shell module it will execute the command in the shell and it will redirect the output to the file output.txt

  - name: redirect the output using shell #using shell module to execute the command in the shell and redirect the output to the file output.txt
    ansible.builtin.shell: ls -ltr > /tmp/output.txt # to redirect the output of the command to the file output.txt but when we use command module it will not execute the command in the shell and it will not redirect the output to the file output.txt but when we use shell module it will execute the command in the shell and it will redirect the output to the file output.txt
    register: redirect_output

  - name: print redirect_output shell
    ansible.builtin.debug:
      msg: "{{ redirect_output }}" # to print the output of the command stored in the variable redirect_output, when we use shell module it will execute the command in the shell and it will redirect the output to the file output.txt but when we use command module it will not execute the command in the shell and it will not redirect the output to the file output.txt