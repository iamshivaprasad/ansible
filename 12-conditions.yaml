- name: conditions
  hosts: local
  connection: local
  vars:
    number: 12
  tasks:
  - name: check number is less than 10 or not
    ansible.builtin.debug:
      msg: "Given number {{ number }} is less than 10"
    when: number < 10  #to check the condition if the number is less than 10 then only this task will be executed otherwise it will be skipped 

